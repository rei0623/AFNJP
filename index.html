<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Frontier News JP | 公式サイト</title>
    <meta name="description" content="世界の最新AIニュースを、日本語で、どこよりも分かりやすくキャッチアップできる場所。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI Frontier News JP | 公式サイト">
    <meta property="og:description" content="世界の最新AIニュースを、日本語で、どこよりも分かりやすくキャッチアップできる場所。">
    <meta property="og:url" content="https://rei0623.github.io/AFNJP/">
    <meta property="og:image" content="https://rei0623.github.io/AFNJP/AFNJP.jpg">
    <meta property="og:image:secure_url" content="https://rei0623.github.io/AFNJP/AFNJP.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="AI Frontier News JP コミュニティアイコン">
    <meta property="og:locale" content="ja_JP">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@AI_FrontierNews">
    <meta name="twitter:title" content="AI Frontier News JP | 公式サイト">
    <meta name="twitter:description" content="世界の最新AIニュースを、日本語で、どこよりも分かりやすくキャッチアップできる場所。">
    <meta name="twitter:image" content="https://rei0623.github.io/AFNJP/AFNJP.jpg">
    <meta name="twitter:image:alt" content="AI Frontier News JP コミュニティアイコン">
    <link rel="canonical" href="https://rei0623.github.io/AFNJP/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Shippori+Mincho:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030508;
            --bg-gradient: radial-gradient(circle at 50% -20%, #1a233a, #030508 60%);
            --accent-primary: #46f3c1;
            --accent-secondary: #6b84ff;
            --accent-tertiary: #f4b36b;
            --glass-surface: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f0f4f8;
            --text-muted: rgba(240, 244, 248, 0.6);
            --font-serif: "Shippori Mincho", serif;
            --font-sans: "Zen Kaku Gothic New", sans-serif;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-deep);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Dynamic Background */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--accent-primary), transparent 70%);
            top: -20%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--accent-secondary), transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-tertiary), transparent 70%);
            top: 40%;
            left: 40%;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.07'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
        }

        /* Main Card Container */
        .card-container {
            position: relative;
            width: min(90vw, 500px);
            transform-style: preserve-3d;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-surface);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            transition: transform 0.1s var(--ease-out-expo), box-shadow 0.3s ease;
        }

        /* Shine Effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right,
                    transparent,
                    rgba(255, 255, 255, 0.1),
                    transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
            pointer-events: none;
        }

        .glass-card:hover::before {
            left: 150%;
            transition: 0.7s;
        }

        /* Logo Area */
        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            transform-style: preserve-3d;
        }

        .logo-glow {
            position: absolute;
            inset: -10px;
            background: conic-gradient(from 0deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary), var(--accent-primary));
            border-radius: 30px;
            filter: blur(20px);
            opacity: 0.6;
            animation: spin 10s linear infinite;
            z-index: -1;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateZ(20px);
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Typography */
        h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #fff 30%, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(70, 243, 193, 0.3);
            transform: translateZ(10px);
        }

        .description {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            transform: translateZ(5px);
        }

        /* Action Buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transform: translateZ(15px);
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.3s var(--ease-out-expo);
            overflow: hidden;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .btn-primary:hover {
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(70, 243, 193, 0.2);
        }

        .btn-primary:hover::before {
            opacity: 1;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Footer */
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.2);
            transform: translateZ(2px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 2.5rem 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .orb-1 {
                width: 80vw;
                height: 80vw;
            }

            .orb-2 {
                width: 70vw;
                height: 70vw;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="noise"></div>

    <main class="card-container" id="card">
        <div class="glass-card">
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <img src="AFNJP.jpg" alt="AI Frontier News JP Logo" class="logo-img">
            </div>

            <h1>AI Frontier News JP</h1>
            <p class="description">
                世界の最新AIニュースを、日本語で、<br>
                どこよりも分かりやすくキャッチアップできる場所。
            </p>

            <div class="actions">
                <a href="https://discord.gg/B3eJAX6mnN" target="_blank" rel="noopener noreferrer"
                    class="btn btn-primary">
                    Discordに参加する
                </a>
                <a href="https://twitter.com/AI_FrontierNews" target="_blank" rel="noopener noreferrer"
                    class="btn btn-secondary">
                    公式X (Twitter) を見る
                </a>
            </div>

            <div class="footer">
                &copy; 2024 AI Frontier News JP
            </div>
        </div>
    </main>

    <script>
        const card = document.getElementById('card');
        const glassCard = card.querySelector('.glass-card');

        // 3D Tilt Effect
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;

            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
            glassCard.style.transform = 'translateZ(0px)';
        });

        // Add depth on hover
        card.addEventListener('mouseenter', () => {
            glassCard.style.transform = 'translateZ(20px)';
        });
    </script>
</body>

</html>
